<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator - Dark & Light Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>🧮 Calculator Pro</h1>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Container -->
        <main class="container">
            <div class="calculator-wrapper">
                <!-- Calculator Section -->
                <section class="calculator-section">
                    <div class="section-header">
                        <h2>Calculator</h2>
                        <button class="mode-toggle" id="modeToggle" title="Toggle Scientific Mode">🔬</button>
                    </div>
                    
                    <!-- Display -->
                    <div class="display-container">
                        <input type="text" id="display" class="display" readonly placeholder="0">
                        <button class="copy-btn" onclick="Calculator.copyToClipboard()" title="Copy Result">📋</button>
                    </div>

                    <!-- Memory Indicator -->
                    <div class="memory-display" id="memoryDisplay"></div>

                    <!-- Basic Calculator -->
                    <div id="basicCalc" class="buttons-section">
                        <div class="button-grid">
                            <!-- Row 1 -->
                            <button class="btn btn-function" onclick="Calculator.clear()">C</button>
                            <button class="btn btn-function" onclick="Calculator.delete()">DEL</button>
                            <button class="btn btn-function" onclick="Calculator.toggleSign()">±</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('%')">%</button>

                            <!-- Row 2 -->
                            <button class="btn btn-function" onclick="Calculator.square()">x²</button>
                            <button class="btn btn-function" onclick="Calculator.sqrt()">√</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('/')">÷</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('*')">×</button>

                            <!-- Row 3 -->
                            <button class="btn" onclick="Calculator.append('7')">7</button>
                            <button class="btn" onclick="Calculator.append('8')">8</button>
                            <button class="btn" onclick="Calculator.append('9')">9</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('-')">−</button>

                            <!-- Row 4 -->
                            <button class="btn" onclick="Calculator.append('4')">4</button>
                            <button class="btn" onclick="Calculator.append('5')">5</button>
                            <button class="btn" onclick="Calculator.append('6')">6</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('+')">+</button>

                            <!-- Row 5 -->
                            <button class="btn" onclick="Calculator.append('1')">1</button>
                            <button class="btn" onclick="Calculator.append('2')">2</button>
                            <button class="btn" onclick="Calculator.append('3')">3</button>
                            <button class="btn btn-equals" onclick="Calculator.calculate()">=</button>

                            <!-- Row 6 -->
                            <button class="btn btn-zero" onclick="Calculator.append('0')">0</button>
                            <button class="btn" onclick="Calculator.append('.')">.</button>
                        </div>
                    </div>

                    <!-- Scientific Calculator -->
                    <div id="scientificCalc" class="buttons-section" style="display: none;">
                        <div class="button-grid">
                            <!-- Memory Row -->
                            <button class="btn btn-memory" onclick="Calculator.memoryAdd()">M+</button>
                            <button class="btn btn-memory" onclick="Calculator.memorySubtract()">M−</button>
                            <button class="btn btn-memory" onclick="Calculator.memoryRecall()">MR</button>
                            <button class="btn btn-memory" onclick="Calculator.memoryClear()">MC</button>

                            <!-- Trig Row -->
                            <button class="btn btn-function" onclick="Calculator.sine()">sin</button>
                            <button class="btn btn-function" onclick="Calculator.cosine()">cos</button>
                            <button class="btn btn-function" onclick="Calculator.tangent()">tan</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('^')">x^y</button>

                            <!-- Log Row -->
                            <button class="btn btn-function" onclick="Calculator.logarithm()">log</button>
                            <button class="btn btn-function" onclick="Calculator.naturalLog()">ln</button>
                            <button class="btn btn-function" onclick="Calculator.cube()">x³</button>
                            <button class="btn btn-function" onclick="Calculator.reciprocal()">1÷x</button>

                            <!-- Special Row -->
                            <button class="btn btn-function" onclick="Calculator.factorial()">n!</button>
                            <button class="btn btn-function" onclick="Calculator.exponential()">exp</button>
                            <button class="btn btn-operator" onclick="Calculator.setOperation('%')">%</button>
                            <button class="btn btn-function" onclick="Calculator.absoluteValue()">|x|</button>
                        </div>
                    </div>

                    <!-- History Panel -->
                    <div class="history-panel">
                        <div class="history-header">
                            <span>📜 History</span>
                            <button class="history-clear" onclick="Calculator.clearHistory()">🗑️</button>
                        </div>
                        <div id="historyList" class="history-list"></div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Calculator Pro v3.0 | Modern Design with Dark Mode</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            themeToggle.querySelector('.theme-icon').textContent = theme === 'light' ? '🌙' : '☀️';
        }

        // Scientific Mode Toggle
        const modeToggle = document.getElementById('modeToggle');
        const basicCalc = document.getElementById('basicCalc');
        const scientificCalc = document.getElementById('scientificCalc');

        modeToggle.addEventListener('click', () => {
            const isBasicVisible = basicCalc.style.display !== 'none';
            basicCalc.style.display = isBasicVisible ? 'none' : 'block';
            scientificCalc.style.display = isBasicVisible ? 'block' : 'none';
            modeToggle.style.transform = isBasicVisible ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // Update displays
        function updateHistoryDisplay() {
            const history = Calculator.getHistory();
            const historyList = document.getElementById('historyList');
            if (history.length === 0) {
                historyList.innerHTML = '<p class="no-history">No calculations yet</p>';
                return;
            }
            historyList.innerHTML = history.slice(0, 10).map(item => 
                `<div class="history-item" onclick="navigator.clipboard.writeText('${item.split('=')[1]?.trim() || ''}')" title="Click to copy">${item}</div>`
            ).join('');
        }

        function updateMemoryDisplay() {
            const memoryDisplay = document.getElementById('memoryDisplay');
            if (Calculator.memory !== 0) {
                memoryDisplay.textContent = `M: ${Calculator.memory.toFixed(2)}`;
                memoryDisplay.style.display = 'block';
            } else {
                memoryDisplay.style.display = 'none';
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            updateHistoryDisplay();
            updateMemoryDisplay();
        });
    </script>
</body>
</html>
